apiVersion: apps/v1
kind: Deployment
metadata:
  name: easydocument-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: easydocument-api
  template:
    metadata:
      labels:
        app: easydocument-api
    spec:
      containers:
        - name: api
          image: registry.example.com/easydocument/api:1.0.0
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: easydocument-api-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: easydocument-api
spec:
  selector:
    app: easydocument-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
