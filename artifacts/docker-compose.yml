version: "3.9"
services:
  postgres:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: easydocument
      POSTGRES_USER: easydoc
      POSTGRES_PASSWORD: easydoc_dev_password
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio_data:/data
  api:
    build: ../backend
    depends_on: [postgres, redis, minio]
    environment:
      DATABASE_URL: postgresql://easydoc:easydoc_dev_password@postgres:5432/easydocument
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      JWT_SECRET: change-me
    ports: ["3000:3000"]
volumes:
  postgres_data:
  minio_data:
