name: Manual Staging Deployment Gate

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to stage, usually sha-<commit> or v<semver>"
        required: true
        type: string
      run_smoke_tests:
        description: "Run smoke tests against STAGING_API_URL"
        required: true
        type: boolean
        default: true
      confirm_staging_deployment:
        description: "Type STAGING to run the manual staging gate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  staging-gate:
    name: Validate Staging Deployment Inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Confirm manual staging gate
        run: |
          if [ "${{ inputs.confirm_staging_deployment }}" != "STAGING" ]; then
            echo "Staging deployment gate not confirmed."
            exit 1
          fi
      - name: Validate Kubernetes manifests
        run: |
          python3 -m pip install pyyaml
          ./scripts/validate-kubernetes-manifests.sh
      - name: Verify staging config references
        env:
          NODE_ENV: staging
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          REDIS_URL: ${{ secrets.STAGING_REDIS_URL }}
          JWT_SECRET: ${{ secrets.STAGING_JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.STAGING_CORS_ORIGIN }}
          MINIO_ENDPOINT: ${{ secrets.STAGING_MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.STAGING_MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.STAGING_MINIO_SECRET_KEY }}
          MINIO_BUCKET_KYC: ${{ secrets.STAGING_MINIO_BUCKET_KYC }}
          MINIO_BUCKET_CHAT: ${{ secrets.STAGING_MINIO_BUCKET_CHAT }}
          MINIO_BUCKET_EXPORTS: ${{ secrets.STAGING_MINIO_BUCKET_EXPORTS }}
          SMS_PROVIDER: ${{ secrets.STAGING_SMS_PROVIDER }}
          SMS_PROVIDER_API_KEY: ${{ secrets.STAGING_SMS_PROVIDER_API_KEY }}
          SMS_PROVIDER_SENDER_ID: ${{ secrets.STAGING_SMS_PROVIDER_SENDER_ID }}
          PUSH_PROVIDER: ${{ secrets.STAGING_PUSH_PROVIDER }}
          FIREBASE_PROJECT_ID: ${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_SECRET_NAME: ${{ secrets.STAGING_FIREBASE_SERVICE_ACCOUNT_SECRET_NAME }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.STAGING_GOOGLE_MAPS_API_KEY }}
        run: ./scripts/verify-production-config.sh
      - name: Print staging apply commands
        run: |
          echo "Manual staging gate passed for image tag ${{ inputs.image_tag }}."
          echo "Apply through your cluster deployment tool with:"
          echo "  API image: ghcr.io/<owner>/api:${{ inputs.image_tag }}"
          echo "  Admin image: ghcr.io/<owner>/admin:${{ inputs.image_tag }}"
          echo "This workflow does not apply manifests automatically."
      - name: Optional staging smoke tests
        if: ${{ inputs.run_smoke_tests }}
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          EXPECT_SMS_PROVIDER: ${{ secrets.STAGING_SMS_PROVIDER }}
          EXPECT_PUSH_PROVIDER: ${{ secrets.STAGING_PUSH_PROVIDER }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "STAGING_API_URL is not configured; skipping smoke tests."
            exit 0
          fi
          ./scripts/deployment-smoke-test.sh

