name: Container Registry Promotion

on:
  workflow_dispatch:
    inputs:
      semantic_version:
        description: "Semantic release version, for example v1.2.3"
        required: true
        type: string
      deploy_environment:
        description: "Environment tag to update"
        required: true
        type: choice
        options:
          - staging
          - production
      source_sha:
        description: "Commit SHA to build and tag; defaults to the workflow SHA"
        required: false
        type: string
      confirm_registry_promotion:
        description: "Type PROMOTE to build and push registry tags"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-promote:
    name: Build And Promote Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.sha }}
      - name: Confirm manual promotion
        run: |
          if [ "${{ inputs.confirm_registry_promotion }}" != "PROMOTE" ]; then
            echo "Registry promotion not confirmed."
            exit 1
          fi
      - name: Validate image tags
        env:
          COMMIT_SHA: ${{ inputs.source_sha || github.sha }}
          SEMANTIC_VERSION: ${{ inputs.semantic_version }}
          DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
        run: ./scripts/validate-image-tags.sh
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tags
        id: tags
        env:
          COMMIT_SHA: ${{ inputs.source_sha || github.sha }}
          SEMANTIC_VERSION: ${{ inputs.semantic_version }}
          DEPLOY_ENVIRONMENT: ${{ inputs.deploy_environment }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:12}"
          VERSION_TAG="${SEMANTIC_VERSION#v}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "version_tag=v${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "environment_tag=${DEPLOY_ENVIRONMENT}" >> "$GITHUB_OUTPUT"
      - name: Build and push API image
        run: |
          docker build \
            -f services/api/Dockerfile \
            -t "${REGISTRY_NAMESPACE}/api:${{ steps.tags.outputs.sha_tag }}" \
            -t "${REGISTRY_NAMESPACE}/api:${{ steps.tags.outputs.version_tag }}" \
            -t "${REGISTRY_NAMESPACE}/api:${{ steps.tags.outputs.environment_tag }}" \
            .
          docker push "${REGISTRY_NAMESPACE}/api:${{ steps.tags.outputs.sha_tag }}"
          docker push "${REGISTRY_NAMESPACE}/api:${{ steps.tags.outputs.version_tag }}"
          docker push "${REGISTRY_NAMESPACE}/api:${{ steps.tags.outputs.environment_tag }}"
      - name: Build and push admin image
        run: |
          docker build \
            -f apps/admin/Dockerfile \
            --build-arg VITE_API_BASE_URL=https://api.easydocument.example/v1 \
            --build-arg VITE_SOCKET_URL=https://api.easydocument.example \
            -t "${REGISTRY_NAMESPACE}/admin:${{ steps.tags.outputs.sha_tag }}" \
            -t "${REGISTRY_NAMESPACE}/admin:${{ steps.tags.outputs.version_tag }}" \
            -t "${REGISTRY_NAMESPACE}/admin:${{ steps.tags.outputs.environment_tag }}" \
            .
          docker push "${REGISTRY_NAMESPACE}/admin:${{ steps.tags.outputs.sha_tag }}"
          docker push "${REGISTRY_NAMESPACE}/admin:${{ steps.tags.outputs.version_tag }}"
          docker push "${REGISTRY_NAMESPACE}/admin:${{ steps.tags.outputs.environment_tag }}"

