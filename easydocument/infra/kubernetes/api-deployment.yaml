apiVersion: apps/v1
kind: Deployment
metadata:
  name: easydocument-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: easydocument-api
  template:
    metadata:
      labels:
        app: easydocument-api
    spec:
      containers:
        - name: api
          image: ghcr.io/easydocument/api:staging
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: easydocument-config
            - secretRef:
                name: easydocument-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: easydocument-api
spec:
  selector:
    app: easydocument-api
  ports:
    - name: http
      port: 80
      targetPort: 3000
