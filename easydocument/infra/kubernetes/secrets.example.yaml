apiVersion: v1
kind: Secret
metadata:
  name: easydocument-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://USER:PASSWORD@postgres.example:5432/easydocument"
  REDIS_URL: "rediss://redis.example:6379"
  CORS_ORIGIN: "https://admin.easydocument.example"
  MINIO_ENDPOINT: "minio.example"
  MINIO_ACCESS_KEY: "replace-with-access-key"
  MINIO_SECRET_KEY: "replace-with-secret-key"
  MINIO_BUCKET: "easydocument"
  MINIO_BUCKET_KYC: "easydocument-kyc"
  MINIO_BUCKET_CHAT: "easydocument-chat"
  MINIO_BUCKET_EXPORTS: "easydocument-exports"
  JWT_SECRET: "replace-with-strong-random-secret"
  ADMIN_API_URL: "https://api.easydocument.example"
  MOBILE_API_URL: "https://api.easydocument.example"
  SOCKET_URL: "https://api.easydocument.example"
