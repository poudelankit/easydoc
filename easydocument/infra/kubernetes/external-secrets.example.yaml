apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: easydocument-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: easydocument-secrets-reader
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: easydocument-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: easydocument-secret-store
    kind: SecretStore
  target:
    name: easydocument-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: easydocument/production
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: easydocument/production
        property: REDIS_URL
    - secretKey: JWT_SECRET
      remoteRef:
        key: easydocument/production
        property: JWT_SECRET
    - secretKey: CORS_ORIGIN
      remoteRef:
        key: easydocument/production
        property: CORS_ORIGIN
    - secretKey: MINIO_ENDPOINT
      remoteRef:
        key: easydocument/production
        property: MINIO_ENDPOINT
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: easydocument/production
        property: MINIO_ACCESS_KEY
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: easydocument/production
        property: MINIO_SECRET_KEY
    - secretKey: MINIO_BUCKET
      remoteRef:
        key: easydocument/production
        property: MINIO_BUCKET
    - secretKey: ADMIN_API_URL
      remoteRef:
        key: easydocument/production
        property: ADMIN_API_URL
    - secretKey: MOBILE_API_URL
      remoteRef:
        key: easydocument/production
        property: MOBILE_API_URL
    - secretKey: SOCKET_URL
      remoteRef:
        key: easydocument/production
        property: SOCKET_URL
