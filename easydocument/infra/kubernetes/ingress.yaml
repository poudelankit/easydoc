apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: easydocument
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.easydocument.example
        - admin.easydocument.example
      secretName: easydocument-tls
  rules:
    - host: api.easydocument.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: easydocument-api
                port:
                  number: 80
    - host: admin.easydocument.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: easydocument-admin
                port:
                  number: 80
