apiVersion: apps/v1
kind: Deployment
metadata:
  name: easydocument-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: easydocument-admin
  template:
    metadata:
      labels:
        app: easydocument-admin
    spec:
      containers:
        - name: admin
          image: ghcr.io/easydocument/admin:staging
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: easydocument-admin
spec:
  selector:
    app: easydocument-admin
  ports:
    - name: http
      port: 80
      targetPort: 8080
