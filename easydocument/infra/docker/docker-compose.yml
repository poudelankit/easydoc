name: easydocument

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: easydocument-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easydocument}
      POSTGRES_USER: ${POSTGRES_USER:-easydoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easydoc_dev_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - easydocument_postgres_data:/var/lib/postgresql/data
      - ../../database/migrations:/migrations:ro
      - ../../database/seeds:/seeds:ro
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easydoc} -d ${POSTGRES_DB:-easydocument}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easydocument-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - easydocument_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: easydocument-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - easydocument_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    container_name: easydocument-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-easydoc}:${POSTGRES_PASSWORD:-easydoc_dev_password}@postgres:5432/${POSTGRES_DB:-easydocument}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_KYC: ${MINIO_BUCKET_KYC:-easydocument-kyc}
      MINIO_BUCKET_CHAT: ${MINIO_BUCKET_CHAT:-easydocument-chat}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-easydocument-exports}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-local-secret}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      SMS_PROVIDER: ${SMS_PROVIDER:-local-mock}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5

  admin:
    profiles: ["app"]
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3000}
    container_name: easydocument-admin
    ports:
      - "${ADMIN_PROD_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  easydocument_postgres_data:
    name: easydocument_postgres_data
  easydocument_redis_data:
    name: easydocument_redis_data
  easydocument_minio_data:
    name: easydocument_minio_data
