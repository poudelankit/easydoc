name: easydocument

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: easydocument-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easydocument}
      POSTGRES_USER: ${POSTGRES_USER:-easydoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easydoc_dev_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - easydocument_postgres_data:/var/lib/postgresql/data
      - ../../database/migrations:/migrations:ro
      - ../../database/seeds:/seeds:ro
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easydoc} -d ${POSTGRES_DB:-easydocument}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: easydocument-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - easydocument_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: easydocument-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - easydocument_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  easydocument_postgres_data:
    name: easydocument_postgres_data
  easydocument_redis_data:
    name: easydocument_redis_data
  easydocument_minio_data:
    name: easydocument_minio_data
