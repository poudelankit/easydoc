name: easydocument_mobile
description: EasyDocument Flutter mobile app for customers and agents.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  equatable: ^2.0.5
  flutter_bloc: ^8.1.6
  go_router: ^14.2.7
  socket_io_client: ^2.0.3+1
  url_launcher: ^6.3.1
  google_maps_flutter: ^2.9.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
